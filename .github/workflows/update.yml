name: Update news

# 3時間ごとの自動実行と、手動実行(workflow_dispatch)の両方に対応する
on:
  schedule:
    # UTC基準で3時間ごと（00:00, 03:00, ... = JSTで09:00, 12:00, ...）。1日8回。
    - cron: "0 */3 * * *"
  workflow_dispatch: {}

# 標準の GITHUB_TOKEN への権限（push と、失敗時の Issue 作成のため）
permissions:
  contents: write
  issues: write

# 実行が重ならないようにする（前の実行が終わるまで待つ）
concurrency:
  group: update-news
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: ニュースを取得して docs/index.html を生成
        run: python fetch_news.py

      - name: 変更があれば自動コミット＆プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "変更なし。コミットはスキップします。"
          else
            git commit -m "Auto update news ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
            echo "更新（index.html / アーカイブ）をプッシュしました。"
          fi

      - name: 取得失敗を Issue で通知
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create fetch-failure --color B60205 --description "ニュース取得の失敗" --force || true
          open_count=$(gh issue list --label fetch-failure --state open --json number --jq 'length')
          if [ "$open_count" = "0" ]; then
            gh issue create \
              --title "ニュース取得に失敗しました ($(date -u '+%Y-%m-%d %H:%M UTC'))" \
              --label fetch-failure \
              --body "自動更新ワークフローでニュース取得に失敗しました。詳しくは実行ログを確認してください: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            echo "未解決の fetch-failure Issue が既にあるため、新規作成はスキップします。"
          fi
